site_name: EthoGraph
site_description: GUI for segmenting animal behaviour using transformer models and changepoint detection
site_url: https://ethograph.readthedocs.io
repo_url: https://github.com/akseli-ilmanen/ethograph
repo_name: ethograph

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  logo: media/icon.png
  favicon: media/icon.png
  icon:
    repo: fontawesome/brands/github

plugins:
  - mkdocstrings:
      handlers:
        python:
            options:
              show_source: true
              docstring_style: numpy        # or google — pick one and be consistent
              docstring_section_style: table # renders params/returns as a table
              show_root_heading: true
              show_symbol_type_heading: true
              show_signature_annotations: true
              separate_signature: true       # puts the signature on its own line
              merge_init_into_class: true
              members_order: source
              group_by_category: true        # groups methods, attributes, etc.
              heading_level: 2
            inventories:
            - https://docs.xarray.dev/en/stable/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pandas.pydata.org/pandas-docs/stable/objects.inv
            - https://movement.neuroinformatics.dev/latest/objects.inv
            - https://audian.readthedocs.io/en/latest/objects.inv
            - https://www.riverbankcomputing.com/static/Docs/PyQt5/objects.inv
            - https://pynapple-org.github.io/pynapple/objects.inv
  - autorefs

            
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/akseli-ilmanen.bsky.social
      name: Akseli Ilmanen on Bluesky

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Getting Started Wizard: wizard.md
      - Loading Data:
          - Overview: data-loading.md
          - From a pose file: loading-pose.md
          - From an audio file: loading-audio.md
          - From a numpy file: loading-numpy.md
          - From an ephys recording: loading-ephys.md
          - Multi-trial (script): loading-script.md
          - Other / custom formats: loading-other.md
      - TrialTree: trialtree.md
      - Data requirements: data-requirements.md
      - Dataset tutorials: tutorials.md
      - Export/Import of labels: export-labels.md

  - GUI User Guide:
      - Keyboard Shortcuts: shortcuts.md
      - Labelling: labelling.md
      - Changepoints: changepoints.md
      - Plot Settings: plot-settings.md

  - API Reference:
      - Overview: api/index.md
      - TrialTree: api/trialtree.md
      - Label Intervals: api/label-intervals.md
      - Data Utilities: api/xr-utils.md
      - Features:
          - Neural: api/features/neural.md
          - Changepoints: api/features/changepoints.md
          - Movement: api/features/movement.md
          - Energy Envelopes: api/features/energy.md
          - Preprocessing: api/features/preprocessing.md
          - Audio Changepoints: api/features/audio-changepoints.md
          - Oscillatory Events: api/features/oscillatory.md
      - Validation: api/validation.md

  - Help:
      - Troubleshooting: troubleshooting.md


