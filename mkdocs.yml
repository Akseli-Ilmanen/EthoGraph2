site_name: EthoGraph
site_description: GUI for segmenting animal behaviour using transformer models and changepoint detection
site_url: https://ethograph.readthedocs.io
repo_url: https://github.com/akseli-ilmanen/ethograph
repo_name: ethograph

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  logo: media/icon.png
  favicon: media/icon.png
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/akseli-ilmanen.bsky.social
      name: Akseli Ilmanen on Bluesky

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Getting Started Wizard: wizard.md
      - Loading data: data-loading.md
      - TrialTree: trialtree.md
      - Data requirements: data-requirements.md
      - Ephys data: ephys-data.md
      - Dataset tutorials: tutorials.md
      - Export/Import of labels: export-labels.md

  - GUI User Guide:
      - Keyboard Shortcuts: shortcuts.md
      - Labelling: labelling.md
      - Changepoints: changepoints.md
      - Plot Settings: plot-settings.md

  - Help:
      - Troubleshooting: troubleshooting.md


